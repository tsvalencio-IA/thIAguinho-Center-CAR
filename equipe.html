<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>JARVIS ERP — Equipe</title>
  <link rel="stylesheet" href="css/design.css">
</head>
<body onload="initCoreEquipe()">
  <div id="toast-container"></div>

  <div style="display:flex;height:100vh">
    <!-- SIDEBAR -->
    <div style="width:250px;background:var(--bg-secondary);border-right:1px solid var(--border);overflow-y:auto;padding:var(--spacing-lg)">
      <div style="margin-bottom:var(--spacing-2xl)">
        <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:white;margin-bottom:var(--spacing-md)">J</div>
        <div style="font-weight:700;font-size:var(--fs-sm)" id="sbTenantNome">Oficina</div>
        <div style="font-size:var(--fs-xs);color:var(--text-muted)" id="sbUserNome">Equipe</div>
      </div>

      <nav style="display:flex;flex-direction:column;gap:var(--spacing-sm)">
        <a href="#" onclick="showEqSection('os')" class="nav-item" style="padding:var(--spacing-md);border-radius:var(--r-md);text-decoration:none;color:var(--text-secondary);transition:var(--transition)">📋 Minhas O.S.</a>
        <a href="#" onclick="showEqSection('comissoes')" class="nav-item" style="padding:var(--spacing-md);border-radius:var(--r-md);text-decoration:none;color:var(--text-secondary);transition:var(--transition)">💰 Comissões</a>
        <a href="#" onclick="showEqSection('chat')" class="nav-item" style="padding:var(--spacing-md);border-radius:var(--r-md);text-decoration:none;color:var(--text-secondary);transition:var(--transition)">💬 Chat</a>
      </nav>

      <div style="margin-top:var(--spacing-2xl);padding-top:var(--spacing-lg);border-top:1px solid var(--border)">
        <button class="btn btn-ghost btn-full" onclick="fazerLogout()" style="justify-content:flex-start">🚪 Sair</button>
      </div>
    </div>

    <!-- MAIN -->
    <div style="flex:1;overflow-y:auto;background:var(--bg-primary)">
      <!-- TOPBAR -->
      <div style="background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:var(--spacing-lg);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100">
        <div style="font-size:var(--fs-lg);font-weight:700" id="eqTopTitle">Minhas O.S.</div>
        <div style="display:flex;gap:var(--spacing-md);align-items:center">
          <span style="font-size:var(--fs-sm);color:var(--text-muted)">Bem-vindo, <strong id="sbUserRole">EQUIPE</strong></span>
          <div style="width:36px;height:36px;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:var(--fs-lg)" id="sbAvatar">J</div>
        </div>
      </div>

      <!-- SECTIONS -->
      <div style="padding:var(--spacing-2xl)">
        <!-- MINHAS O.S. -->
        <div id="eqOSSection" class="section">
          <h1 style="margin-bottom:var(--spacing-xl)">📋 Minhas Ordens de Serviço</h1>
          <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">
            <table>
              <thead>
                <tr>
                  <th>Placa</th>
                  <th>Cliente</th>
                  <th>Serviço</th>
                  <th>Status</th>
                  <th>Valor</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody id="tbOSEquipe"></tbody>
            </table>
          </div>
        </div>

        <!-- COMISSÕES -->
        <div id="eqComissoesSection" class="section" style="display:none">
          <h1 style="margin-bottom:var(--spacing-xl)">💰 Minhas Comissões</h1>
          <div id="boxComissaoDetalhada"></div>
        </div>

        <!-- CHAT -->
        <div id="eqChatSection" class="section" style="display:none">
          <h1 style="margin-bottom:var(--spacing-xl)">💬 Chat com Admin</h1>
          <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--spacing-lg);height:400px;display:flex;flex-direction:column">
            <div id="chatMsgs" style="flex:1;overflow-y:auto;margin-bottom:var(--spacing-lg);display:flex;flex-direction:column;gap:var(--spacing-md)"></div>
            <div style="display:flex;gap:var(--spacing-sm)">
              <input class="input" id="chatInputEquipe" type="text" placeholder="Digite sua mensagem...">
              <button class="btn btn-brand" onclick="enviarMsgEquipe()">Enviar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/core.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ia.js"></script>

  <script>
    function showEqSection(section) {
      document.querySelectorAll('.section').forEach(el => el.style.display = 'none');
      document.getElementById('eq' + (section === 'os' ? 'OS' : section === 'comissoes' ? 'Comissoes' : 'Chat') + 'Section').style.display = 'block';
      
      const titles = {
        os: '📋 Minhas O.S.',
        comissoes: '💰 Minhas Comissões',
        chat: '💬 Chat com Admin'
      };
      document.getElementById('eqTopTitle').textContent = titles[section] || 'Minhas O.S.';

      if (section === 'comissoes') {
        renderComissoes(J.financeiro.filter(f => f.mecId === J.fid));
      } else if (section === 'chat') {
        renderChatEquipe();
      }
    }

    // Render minhas O.S.
    window.renderOSEquipe = function() {
      const container = document.getElementById('tbOSEquipe');
      if (!container) return;

      const osEquipe = J.os.filter(o => o.mecId === J.fid);
      const html = osEquipe.map(o => {
        const cliente = J.clientes.find(c => c.id === o.clienteId);
        const veiculo = J.veiculos.find(v => v.id === o.veiculoId);
        const status = JARVIS_CONST.STATUS_OS.find(s => s.key === o.status);

        return `
          <tr>
            <td style="font-family:var(--ff-mono);font-weight:700">${veiculo?.placa || '?'}</td>
            <td>${cliente?.nome || '?'}</td>
            <td>${o.desc || '—'}</td>
            <td><span style="background-color:${status?.cor}20;color:${status?.cor};padding:4px 8px;border-radius:4px;font-size:0.8rem">${status?.label}</span></td>
            <td style="font-weight:700;color:var(--success)">${moeda(o.total)}</td>
            <td>${dtBr(o.data)}</td>
          </tr>
        `;
      }).join('') || '<tr><td colspan="6" style="text-align:center;padding:20px">Nenhuma O.S. atribuída</td></tr>';

      container.innerHTML = html;
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderOSEquipe();
      renderChatEquipe();
    });
  </script>
</body>
</html>
