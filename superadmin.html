<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Command — JARVIS ERP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/design.css">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
        }
        body { background-color: var(--bg-main); color: #f1f5f9; }
        .hidden { display: none !important; }
        
        /* KPI Estilo Chevron */
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-2px); border-color: var(--brand); }
        
        /* Tabela Master */
        .master-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .master-table tr:hover { background: rgba(255,255,255,0.02); }
        
        #modalNovaOficina { z-index: 9999; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-black/40 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-white text-xl shadow-lg shadow-emerald-500/20">M</div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter uppercase text-white">PAINEL SUPERADMIN</h1>
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Controle de Rede & SaaS</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="fazerLogout()" class="bg-slate-800 hover:bg-red-600 px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                    LOGOUT <i class='bx bx-power-off'></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="kpi-card p-6 rounded-2xl">
                <p class="text-slate-400 text-[10px] font-black uppercase mb-1">Total de Unidades</p>
                <h3 id="statTotal" class="text-3xl font-black text-white">0</h3>
            </div>
            <div class="kpi-card p-6 rounded-2xl border-l-4 border-l-emerald-500">
                <p class="text-emerald-500 text-[10px] font-black uppercase mb-1">Oficinas Ativas</p>
                <h3 id="statAtivas" class="text-3xl font-black text-white">0</h3>
            </div>
            <div class="kpi-card p-6 rounded-2xl border-l-4 border-l-red-500">
                <p class="text-red-500 text-[10px] font-black uppercase mb-1">Oficinas Bloqueadas</p>
                <h3 id="statBloqueadas" class="text-3xl font-black text-white">0</h3>
            </div>
            <div class="flex items-end">
                <button onclick="abrirModal()" class="w-full bg-brand p-4 rounded-xl font-black text-sm uppercase tracking-tighter hover:scale-[1.02] transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20">
                    <i class='bx bx-plus-circle text-xl'></i> Adicionar Nova Oficina
                </button>
            </div>
        </div>

        <div class="bg-slate-800/50 rounded-2xl border border-white/5 overflow-hidden">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-black/20">
                <h2 class="font-bold flex items-center gap-2"><i class='bx bx-list-ul text-emerald-500'></i> Gestão de Inquilinos</h2>
                <div class="relative">
                    <i class='bx bx-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500'></i>
                    <input type="text" placeholder="Filtrar oficina..." class="bg-slate-900 border border-white/10 rounded-lg pl-10 pr-4 py-2 text-xs w-64 focus:border-emerald-500 outline-none">
                </div>
            </div>
            
            <table class="w-full text-left master-table">
                <thead class="bg-black/20 text-slate-500 text-[10px] font-black uppercase">
                    <tr>
                        <th class="px-6 py-4">Dados da Unidade</th>
                        <th class="px-6 py-4">Gestor / Acesso</th>
                        <th class="px-6 py-4 text-center">Status</th>
                        <th class="px-6 py-4 text-right">Ações de Controle</th>
                    </tr>
                </thead>
                <tbody id="listaOficinas" class="text-sm">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modalNovaOficina" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-md rounded-3xl border border-white/10 overflow-hidden shadow-2xl">
            <div class="p-6 bg-black/40 border-b border-white/5 flex justify-between items-center">
                <h3 class="font-black uppercase tracking-tighter text-white">Nova Unidade Jarvis</h3>
                <button onclick="fecharModal()" class="text-slate-500 hover:text-white text-2xl">&times;</button>
            </div>
            
            <form id="formCadastroOficina" class="p-8 space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Nome Fantasia da Oficina</label>
                    <input type="text" id="cadNome" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">E-mail do Gestor (Será o Usuário)</label>
                    <input type="email" id="cadEmail" required class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-brand outline-none transition-all">
                </div>
                
                <div class="bg-blue-500/5 p-4 rounded-xl border border-blue-500/10">
                    <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">Configuração de Acesso Inicial</p>
                    <p class="text-[9px] text-slate-500">A senha padrão gerada será: <b>123456</b></p>
                </div>

                <div class="flex items-start gap-3 py-2">
                    <input type="checkbox" id="lgpdMaster" required class="mt-1">
                    <label for="lgpdMaster" class="text-[10px] text-slate-400 leading-relaxed">
                        Confirmo que esta unidade está ciente dos termos de uso e da <b>Lei Geral de Proteção de Dados (LGPD)</b> para operação no Brasil.
                    </label>
                </div>

                <button type="submit" id="btnSalvar" class="w-full bg-emerald-600 py-4 rounded-xl font-black text-sm uppercase tracking-widest hover:bg-emerald-500 transition-all">
                    CADASTRAR E ATIVAR UNIDADE
                </button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
    
    <script>
        const db = window.initFirebase();

        // 1. ESCUTA REALTIME DAS OFICINAS
        function escutarOficinas() {
            db.collection('oficinas').orderBy('dataCriacao', 'desc').onSnapshot(snap => {
                const lista = document.getElementById('listaOficinas');
                lista.innerHTML = '';
                
                let total = 0, ativas = 0, bloqueadas = 0;

                snap.forEach(doc => {
                    const of = doc.data();
                    total++;
                    if(of.status === 'Ativo') ativas++; else bloqueadas++;

                    const statusClass = of.status === 'Ativo' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500';
                    const btnAcao = of.status === 'Ativo' 
                        ? `<button onclick="alterarStatus('${doc.id}', 'Bloqueado')" class="text-red-400 hover:underline">Bloquear</button>`
                        : `<button onclick="alterarStatus('${doc.id}', 'Ativo')" class="text-emerald-400 hover:underline">Ativar</button>`;

                    lista.innerHTML += `
                        <tr>
                            <td class="px-6 py-4">
                                <span class="font-bold text-white uppercase">${of.nomeFantasia}</span><br>
                                <span class="text-[9px] font-mono text-slate-600">ID: ${doc.id}</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-slate-300">${of.emailGestor}</span><br>
                                <span class="text-[10px] text-slate-500">User: ${of.usuario}</span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span class="${statusClass} px-3 py-1 rounded-full text-[10px] font-black uppercase border border-current/10">${of.status}</span>
                            </td>
                            <td class="px-6 py-4 text-right flex items-center justify-end gap-4">
                                ${btnAcao}
                                <button class="text-slate-500 hover:text-white text-xl"><i class='bx bx-dots-vertical-rounded'></i></button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('statTotal').textContent = total;
                document.getElementById('statAtivas').textContent = ativas;
                document.getElementById('statBloqueadas').textContent = bloqueadas;
            });
        }

        // 2. CADASTRO DE NOVA OFICINA (CORRIGIDO SEM DUPLICIDADE)
        document.getElementById('formCadastroOficina').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerHTML = "PROCESSANDO...";

            const nome = document.getElementById('cadNome').value.trim();
            const email = document.getElementById('cadEmail').value.trim();

            try {
                // SALVA APENAS NA COLEÇÃO 'oficinas' (DIRETRIZ CUMPRIDA)
                await db.collection('oficinas').add({
                    nomeFantasia: nome,
                    emailGestor: email,
                    usuario: email,      // Login do Evolution busca por 'usuario'
                    senha: "123456",     // Senha padrão inicial
                    status: 'Ativo',
                    nicho: 'carros',
                    dataCriacao: firebase.firestore.FieldValue.serverTimestamp(),
                    dataLgpd: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Unidade Cadastrada com Sucesso!");
                fecharModal();
                document.getElementById('formCadastroOficina').reset();

            } catch (err) {
                console.error("Erro ao cadastrar:", err);
                alert("Falha no cadastro. Verifique as regras do Firebase.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "CADASTRAR E ATIVAR UNIDADE";
            }
        };

        // 3. CONTROLE DE STATUS
        async function alterarStatus(id, novoStatus) {
            if(!confirm(`Deseja alterar o status desta oficina para ${novoStatus}?`)) return;
            try {
                await db.collection('oficinas').doc(id).update({ status: novoStatus });
            } catch(e) { alert("Erro ao atualizar status."); }
        }

        // UI HELPERS
        function abrirModal() { document.getElementById('modalNovaOficina').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modalNovaOficina').classList.add('hidden'); }
        function fazerLogout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        // Inicialização
        window.onload = () => {
            if (sessionStorage.getItem('j_role') !== 'superadmin') {
                window.location.href = 'index.html';
                return;
            }
            escutarOficinas();
        };
    </script>
</body>
</html>
