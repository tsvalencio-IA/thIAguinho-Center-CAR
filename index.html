<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JARVIS ERP - Hub de Acesso</title>
<link rel="stylesheet" href="css/design.css">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root { --brand: #00D4FF; --brand-dim: rgba(0, 212, 255, 0.12); --surf-0: #060A14; --surf-1: #0C1426; --surf-2: #111D35; --border: rgba(0, 212, 255, 0.15); --text-primary: #E8F4FF; --text-muted: #7A9AB8; --ff-display: 'Rajdhani', sans-serif; --r-xl: 16px; }
body { background: var(--surf-0); color: var(--text-primary); font-family: 'Exo 2', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
#hubView { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
.logo-mark { width: 80px; height: 80px; border-radius: var(--r-xl); background: linear-gradient(135deg, var(--brand-dim), transparent); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--ff-display); font-size: 2.5rem; font-weight: 800; color: var(--brand); margin: 0 auto 16px; }
.menu-grid { display: grid; gap: 16px; margin-top: 32px; }
.nav-card { background: var(--surf-1); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 20px; text-decoration: none; color: white; display: flex; align-items: center; gap: 16px; position: relative; overflow: hidden; cursor: pointer; text-align: left; }
.nav-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--brand); opacity: 0.5; }
#loginView { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; background: var(--surf-0); z-index: 1000; align-items: center; justify-content: center; }
.login-card { width: 100%; max-width: 360px; background: var(--surf-1); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 30px; }
.input { width: 100%; padding: 12px 16px; background: var(--surf-2); border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 16px; outline: none; }
.btn { width: 100%; padding: 14px; background: var(--brand); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>

<div id="hubView">
  <div class="logo-mark">J</div>
  <h1 style="font-family:var(--ff-display); letter-spacing:2px;">JARVIS ERP</h1>
  <div class="menu-grid">
    <a href="cliente.html" class="nav-card">
      <div style="font-size:1.8rem">🚘</div>
      <div><div style="font-weight:700;">Portal do Cliente</div><div style="font-size:0.75rem;color:var(--text-muted);">Status e OBD</div></div>
    </a>
    <div onclick="abrirLogin('equipe')" class="nav-card">
      <div style="font-size:1.8rem">🔧</div>
      <div><div style="font-weight:700;">Operacional</div><div style="font-size:0.75rem;color:var(--text-muted);">Painel da Equipe</div></div>
    </div>
    <div onclick="abrirLogin('admin')" class="nav-card">
      <div style="font-size:1.8rem">🖥️</div>
      <div><div style="font-weight:700;">Administração</div><div style="font-size:0.75rem;color:var(--text-muted);">Gestão Oficina</div></div>
    </div>
    <a href="superadmin.html" class="nav-card">
      <div style="font-size:1.8rem">⚡</div>
      <div><div style="font-weight:700;">Super Admin</div><div style="font-size:0.75rem;color:var(--text-muted);">Controle Master</div></div>
    </a>
  </div>
</div>

<div id="loginView">
  <div class="login-card">
    <h2 id="loginLabel" style="text-align:center; margin-bottom:20px; font-family:var(--ff-display);">ACESSO</h2>
    <div id="loginErr" style="color:#FF3B3B; font-size:0.8rem; margin-bottom:12px; display:none; text-align:center;"></div>
    <input type="text" id="usr" class="input" placeholder="Usuário">
    <input type="password" id="pwd" class="input" placeholder="Senha">
    <button class="btn" id="btnEntrar" onclick="autenticar()">Entrar no Sistema</button>
    <button class="btn btn-outline" onclick="fecharLogin()">Voltar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>

<script>
const db = window.initFirebase();
let modo = '';

function abrirLogin(m) {
  modo = m;
  document.getElementById('loginLabel').innerText = m === 'admin' ? 'ACESSO GESTOR' : 'ACESSO EQUIPE';
  document.getElementById('hubView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

function fecharLogin() {
  document.getElementById('hubView').style.display = 'block';
  document.getElementById('loginView').style.display = 'none';
}

async function autenticar() {
  const u = document.getElementById('usr').value.trim();
  const p = document.getElementById('pwd').value.trim();
  const btn = document.getElementById('btnEntrar');
  if(!u || !p) return;
  
  btn.disabled = true; btn.innerText = 'Validando...';

  try {
    const col = modo === 'admin' ? 'oficinas' : 'funcionarios';
    const snap = await db.collection(col).where('usuario', '==', u).get();
    
    if (snap.empty) throw new Error('Usuário não encontrado.');
    const doc = snap.docs[0]; const d = doc.data();
    if (d.senha !== p) throw new Error('Senha incorreta.');

    const tid = modo === 'admin' ? doc.id : d.tenantId;
    const ofiSnap = await db.collection('oficinas').doc(tid).get();
    const ofi = ofiSnap.data();

    const sessao = {
      j_tid: tid, j_role: modo === 'admin' ? 'admin' : (d.cargo || 'mecanico'),
      j_nome: modo === 'admin' ? ofi.nomeFantasia : d.nome,
      j_tnome: ofi.nomeFantasia, j_nicho: ofi.nicho || 'carros',
      j_cloud_name: ofi.apiKeys?.cloudName || 'dmuvm1o6m',
      j_cloud_preset: ofi.apiKeys?.cloudPreset || 'evolution'
    };

    const brand = {
      name: ofi.brandName || ofi.nomeFantasia, color: ofi.brandColor || '#00D4FF',
      logoLetter: ofi.brandLetter || (ofi.nomeFantasia || 'J').charAt(0).toUpperCase()
    };
    sessao.j_brand = JSON.stringify(brand);

    Object.entries(sessao).forEach(([k, v]) => sessionStorage.setItem(k, v));
    localStorage.setItem('j_saved_login', JSON.stringify({ usr: u, pwd: p, destino: modo === 'admin' ? 'jarvis.html' : 'equipe.html', session: sessao }));

    window.location.href = modo === 'admin' ? 'jarvis.html' : 'equipe.html';

  } catch (e) {
    const err = document.getElementById('loginErr');
    err.innerText = e.message; err.style.display = 'block';
    btn.disabled = false; btn.innerText = 'Entrar';
  }
}
</script>
</body>
</html>
