<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Office - Login</title>
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: var(--text); }
        .login-container { background: var(--card); padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-top: 0; color: var(--primary); }
        .tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; }
        .tab { flex: 1; text-align: center; padding: 0.75rem; cursor: pointer; font-weight: 600; color: #6b7280; transition: all 0.2s; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -2px; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); ring: 2px solid var(--primary); }
        button { width: 100%; padding: 0.875rem; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .error-msg { color: #dc2626; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; display: none; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 500;">Conectando ao Sistema...</p>
    </div>

    <div class="login-container">
        <h2>Acesso ao Sistema</h2>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('master')" id="tab-master">Master</div>
            <div class="tab" onclick="switchTab('equipe')" id="tab-equipe">Equipe</div>
            <div class="tab" onclick="switchTab('pin')" id="tab-pin">PIN Rápido</div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <input type="hidden" id="login-type" value="master">
            
            <div class="form-group">
                <label for="login-user" id="label-user">Usuário ou E-mail</label>
                <input type="text" id="login-user" required placeholder="Digite seu usuário ou e-mail">
            </div>
            
            <div class="form-group" id="group-pass">
                <label for="login-pass" id="label-pass">Senha</label>
                <input type="password" id="login-pass" placeholder="Digite sua senha">
            </div>

            <div class="form-group hidden" id="group-pin">
                <label for="login-pin">Código PIN</label>
                <input type="password" id="login-pin" maxlength="6" placeholder="****" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
            </div>

            <div id="error-display" class="error-msg"></div>

            <button type="submit" id="btn-login">Entrar</button>
        </form>
    </div>

    <!-- FIREBASE SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- CONFIGURAÇÃO -->
    <script src="js/config.js"></script>

    <!-- LÓGICA DE LOGIN -->
    <script>
        // Inicializa Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Controle de Abas
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            
            const typeInput = document.getElementById('login-type');
            const groupPass = document.getElementById('group-pass');
            const groupPin = document.getElementById('group-pin');
            const labelUser = document.getElementById('label-user');
            const inputUser = document.getElementById('login-user');
            const inputPass = document.getElementById('login-pass');
            const inputPin = document.getElementById('login-pin');

            typeInput.value = type;

            if (type === 'pin') {
                groupPass.classList.add('hidden');
                groupPin.classList.remove('hidden');
                inputUser.required = true;
                inputPass.required = false;
                labelUser.innerText = "Usuário";
                inputUser.placeholder = "Seu usuário";
                inputPin.required = true;
            } else {
                groupPass.classList.remove('hidden');
                groupPin.classList.add('hidden');
                inputUser.required = true;
                inputPass.required = true;
                labelUser.innerText = type === 'master' ? "Usuário ou E-mail" : "Usuário";
                inputUser.placeholder = type === 'master' ? "admin@oficina.com ou admin" : "usuario";
                inputPin.required = false;
            }
            
            document.getElementById('error-display').style.display = 'none';
            inputUser.focus();
        }

        function mostrarLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
            document.getElementById('btn-login').disabled = show;
        }

        async function handleLogin(e) {
            e.preventDefault();
            await autenticar();
        }

        // FUNÇÃO PRINCIPAL DE AUTENTICAÇÃO (CORRIGIDA)
        async function autenticar() {
            const userVal = document.getElementById('login-user').value.trim();
            const passVal = document.getElementById('login-pass').value.trim();
            const pinVal = document.getElementById('login-pin').value.trim();
            const tipo = document.getElementById('login-type').value;

            if (!userVal || (!passVal && tipo !== 'pin')) {
                showError("Preencha todos os campos obrigatórios.");
                return;
            }
            if (tipo === 'pin' && !pinVal) {
                showError("Digite o código PIN.");
                return;
            }

            mostrarLoading(true);
            showError(""); // Limpa erros

            try {
                let docSnap;
                let dados = null;
                let colecao = '';

                // --- LÓGICA MASTER ---
                if (tipo === 'master') {
                    // Tenta buscar por 'usuario'
                    const q1 = db.collection('oficinas').where('usuario', '==', userVal);
                    docSnap = await q1.get();

                    // Se não achar, tenta por 'email' (CORREÇÃO CRÍTICA)
                    if (docSnap.empty && userVal.includes('@')) {
                        const q2 = db.collection('oficinas').where('email', '==', userVal);
                        docSnap = await q2.get();
                    }

                    if (!docSnap.empty) {
                        const doc = docSnap.docs[0];
                        dados = doc.data();
                        dados.id = doc.id;
                        colecao = 'oficinas';

                        if (dados.senha !== passVal) {
                            mostrarLoading(false);
                            showError("Senha incorreta.");
                            return;
                        }
                        if (dados.status && (dados.status.toLowerCase() === 'bloqueado' || dados.status.toLowerCase() === 'inativo')) {
                            mostrarLoading(false);
                            showError("Conta bloqueada. Contate o suporte.");
                            return;
                        }
                    }
                } 
                // --- LÓGICA EQUIPE ---
                else if (tipo === 'equipe') {
                    const q1 = db.collection('funcionarios').where('usuario', '==', userVal);
                    docSnap = await q1.get();
                    
                    if (docSnap.empty && userVal.includes('@')) {
                        const q2 = db.collection('funcionarios').where('email', '==', userVal);
                        docSnap = await q2.get();
                    }

                    if (!docSnap.empty) {
                        const doc = docSnap.docs[0];
                        dados = doc.data();
                        dados.id = doc.id;
                        colecao = 'funcionarios';

                        if (dados.senha !== passVal) {
                            mostrarLoading(false);
                            showError("Senha incorreta.");
                            return;
                        }
                    }
                }
                // --- LÓGICA PIN ---
                else if (tipo === 'pin') {
                    const q1 = db.collection('funcionarios').where('usuario', '==', userVal);
                    docSnap = await q1.get();

                    if (!docSnap.empty) {
                        const doc = docSnap.docs[0];
                        dados = doc.data();
                        dados.id = doc.id;
                        colecao = 'funcionarios';

                        if (dados.pin !== pinVal) {
                            mostrarLoading(false);
                            showError("PIN incorreto.");
                            return;
                        }
                    }
                }

                // --- SUCESSO ---
                if (dados) {
                    sessionStorage.setItem('J.tid', dados.id);
                    sessionStorage.setItem('J.user', JSON.stringify(dados));
                    sessionStorage.setItem('J.tipo', tipo);
                    sessionStorage.setItem('J.colecao', colecao);
                    
                    // Pequeno delay para UX
                    setTimeout(() => {
                        window.location.href = "jarvis.html";
                    }, 500);
                } else {
                    mostrarLoading(false);
                    showError("Usuário não encontrado.");
                }

            } catch (err) {
                console.error("Erro login:", err);
                mostrarLoading(false);
                showError("Erro de conexão: " + err.message);
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-display');
            el.innerText = msg;
            el.style.display = msg ? 'block' : 'none';
        }
    </script>
</body>
</html>
