<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>JARVIS ERP — Acesso</title>
  <link rel="stylesheet" href="css/design.css">
  <style>
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
      animation: gridDrift 30s linear infinite;
    }
    .login-page {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>

  <div class="login-page">
    <div class="login-card" style="animation: modal-in .3s ease">
      <!-- LOGO -->
      <div class="login-logo-wrap">
        <div class="login-logo-mark brand-logo-mark">J</div>
        <div class="login-title brand-name">JARVIS ERP</div>
        <div class="login-sub brand-tagline">Gestão Automotiva Inteligente</div>
      </div>

      <!-- TABS -->
      <div style="display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
        <button class="btn btn-ghost" id="tabMaster" onclick="switchTab('master')" style="flex:1;border-radius:0;border-bottom:2px solid var(--brand);background:transparent">Master</button>
        <button class="btn btn-ghost" id="tabEquipe" onclick="switchTab('equipe')" style="flex:1;border-radius:0;border-bottom:2px solid transparent;background:transparent">Equipe</button>
        <button class="btn btn-ghost" id="tabPin"    onclick="switchTab('pin')"    style="flex:1;border-radius:0;border-bottom:2px solid transparent;background:transparent">PIN</button>
      </div>

      <!-- MASTER LOGIN -->
      <div id="masterTab" class="login-tab">
        <div id="loginErr" class="login-err">Usuário ou senha incorretos.</div>
        <div class="form-group">
          <label class="form-label">Usuário de acesso</label>
          <input class="input input-mono" id="usr" type="text" placeholder="seu.usuario" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="pwd-wrap">
            <input class="input" id="pwd" type="password" placeholder="••••••••">
            <button class="pwd-toggle" type="button" onclick="_togglePwd()" id="pwdToggle" title="Ver senha">👁</button>
          </div>
        </div>
        <button class="btn btn-brand btn-xl btn-full" id="btnLogin" onclick="autenticar()" style="margin-top:8px">
          Entrar no Sistema
        </button>
      </div>

      <!-- EQUIPE LOGIN -->
      <div id="equipeTab" class="login-tab" style="display:none">
        <div id="loginErrEquipe" class="login-err">Usuário ou senha incorretos.</div>
        <div class="form-group">
          <label class="form-label">Usuário</label>
          <input class="input input-mono" id="usrEquipe" type="text" placeholder="seu.usuario" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="pwd-wrap">
            <input class="input" id="pwdEquipe" type="password" placeholder="••••••••">
            <button class="pwd-toggle" type="button" onclick="_togglePwdEquipe()" id="pwdToggleEquipe" title="Ver senha">👁</button>
          </div>
        </div>
        <button class="btn btn-brand btn-xl btn-full" id="btnLoginEquipe" onclick="autenticarEquipe()" style="margin-top:8px">
          Entrar como Equipe
        </button>
      </div>

      <!-- PIN LOGIN -->
      <div id="pinTab" class="login-tab" style="display:none">
        <div id="loginErrPin" class="login-err">Usuário ou PIN incorreto.</div>
        <div class="form-group">
          <label class="form-label">Usuário</label>
          <input class="input input-mono" id="usrPin" type="text" placeholder="seu.usuario" autocomplete="off" spellcheck="false">
        </div>
        <div class="form-group">
          <label class="form-label">PIN (4 dígitos)</label>
          <input class="input" id="pinInput" type="password" placeholder="0000" maxlength="4" style="text-align:center;font-size:1.5rem;letter-spacing:0.2em">
        </div>
        <button class="btn btn-brand btn-xl btn-full" id="btnLoginPin" onclick="autenticarComPIN()" style="margin-top:8px">
          Entrar com PIN
        </button>
      </div>

      <!-- FOOTER -->
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <div class="status-dot online"></div>
        <span style="font-family:var(--ff-mono);font-size:.62rem;color:var(--text-muted)">SISTEMA OPERACIONAL</span>
      </div>
      <div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-family:var(--ff-mono);font-size:.6rem;color:var(--text-disabled)">
        <span class="brand-footer">Powered by thIAguinho Soluções · 2026</span>
      </div>
    </div>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/core.js"></script>
  <script src="js/auth.js"></script>

  <script>
    /**
     * Helpers de UI exclusivos do index.html.
     * Funções de autenticação (autenticar, autenticarEquipe, autenticarComPIN)
     * e todos os listeners de teclado estão em js/auth.js.
     * NÃO adicionar lógica de autenticação ou listeners duplicados aqui.
     */

    // Troca de abas
    function switchTab(tab) {
      document.querySelectorAll('.login-tab').forEach(el => el.style.display = 'none');
      document.querySelectorAll('[id$="Tab"]').forEach(el => el.style.borderBottomColor = 'transparent');

      document.getElementById(tab + 'Tab').style.display = 'block';
      document.getElementById('tab' + (tab === 'master' ? 'Master' : tab === 'equipe' ? 'Equipe' : 'Pin')).style.borderBottomColor = 'var(--brand)';

      if (tab === 'master')       document.getElementById('usr')?.focus();
      else if (tab === 'equipe')  document.getElementById('usrEquipe')?.focus();
      else                        document.getElementById('usrPin')?.focus();
    }

    // Toggle visibilidade senha — aba Master
    function _togglePwd() {
      const pwd = document.getElementById('pwd');
      const btn = document.getElementById('pwdToggle');
      if (!pwd || !btn) return;
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      btn.textContent = pwd.type === 'password' ? '👁' : '🙈';
    }

    // Toggle visibilidade senha — aba Equipe
    function _togglePwdEquipe() {
      const pwd = document.getElementById('pwdEquipe');
      const btn = document.getElementById('pwdToggleEquipe');
      if (!pwd || !btn) return;
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      btn.textContent = pwd.type === 'password' ? '👁' : '🙈';
    }
  </script>
</body>
</html>
