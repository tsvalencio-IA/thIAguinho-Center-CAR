<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>JARVIS ERP — Acesso</title>
<link rel="stylesheet" href="css/design.css">
<style>
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02)1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;animation:gridDrift 30s linear infinite;}
@keyframes gridDrift{to{background-position:48px 48px;}}
.pwd-wrap{position:relative;}
.pwd-wrap .input{padding-right:42px;}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted,#64748b);cursor:pointer;font-size:15px;padding:4px;}
.pwd-toggle:hover{color:var(--text-primary,#f1f5f9);}
.login-card .form-group:nth-child(1){animation:slideUp .4s .1s both;}
.login-card .form-group:nth-child(2){animation:slideUp .4s .2s both;}
.login-card .btn{animation:slideUp .4s .3s both;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="login-page" style="position:relative;z-index:1">
  <div class="login-card" style="animation:modal-in .3s ease">
    <div class="login-logo-wrap">
      <div class="login-logo-mark brand-logo-mark">J</div>
      <div class="login-title brand-name">JARVIS ERP</div>
      <div class="login-sub brand-tagline">Gestão Automotiva Inteligente</div>
    </div>
    <div id="loginErr" class="login-err">Usuário ou senha incorretos.</div>
    <div class="form-group">
      <label class="form-label">Usuário de acesso</label>
      <input class="input input-mono" id="usr" type="text" placeholder="seu.usuario" autocomplete="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <div class="pwd-wrap">
        <input class="input" id="pwd" type="password" placeholder="••••••••">
        <button class="pwd-toggle" type="button" onclick="_togglePwd()" id="pwdToggle" title="Ver senha">👁</button>
      </div>
    </div>
    <button class="btn btn-brand btn-xl btn-full" id="btnLogin" onclick="autenticar()" style="margin-top:8px">
      Entrar no Sistema
    </button>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border,rgba(255,255,255,.07))">
      <div class="status-dot online"></div>
      <span style="font-family:var(--ff-mono,'DM Mono',monospace);font-size:.62rem;color:var(--text-muted,#64748b)">SISTEMA OPERACIONAL</span>
    </div>
  </div>
  <div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-family:var(--ff-mono,'DM Mono',monospace);font-size:.6rem;color:var(--text-disabled,#334155)">
    <span class="brand-footer">Powered by thIAguinho Soluções · 2026</span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script>
sessionStorage.clear();
const db = window.initFirebase();

function _togglePwd(){
  const p=document.getElementById('pwd'),btn=document.getElementById('pwdToggle');
  p.type=p.type==='password'?'text':'password';
  btn.textContent=p.type==='password'?'👁':'🙈';
}

document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')autenticar();});
document.getElementById('usr').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pwd').focus();});

async function autenticar(){
  const usr=document.getElementById('usr').value.trim();
  const pwd=document.getElementById('pwd').value.trim();
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!usr||!pwd){err.textContent='Preencha usuário e senha.';err.style.display='block';return;}
  const btn=document.getElementById('btnLogin');
  btn.innerHTML='<div class="spinner"></div> Autenticando...';btn.disabled=true;

  try{
    // CAMADA 1: Admin da oficina
    const snapOf=await db.collection('oficinas').where('usuario','==',usr).get();
    if(!snapOf.empty){
      const doc=snapOf.docs[0],d=doc.data();
      if(d.senha!==pwd)throw new Error('Senha incorreta.');
      if(d.status==='Bloqueado')throw new Error('Licença bloqueada. Contate o suporte.');
      _salvarSessao(doc.id,d,'admin',d.nomeFantasia||'Gestor',null,d);
      window.location.href='jarvis.html';return;
    }
    // CAMADA 2: Funcionário
    const snapFn=await db.collection('funcionarios').where('usuario','==',usr).get();
    if(!snapFn.empty){
      const docF=snapFn.docs[0],dF=docF.data();
      if(dF.senha!==pwd)throw new Error('Senha incorreta.');
      const mae=await db.collection('oficinas').doc(dF.tenantId).get();
      if(!mae.exists||mae.data().status==='Bloqueado')throw new Error('Oficina bloqueada.');
      const maeData=mae.data();
      const role=dF.cargo==='gerente'?'gerente':dF.cargo==='atendente'?'atendente':'equipe';
      _salvarSessao(dF.tenantId,maeData,role,dF.nome,docF.id,maeData,dF.comissao||0);
      window.location.href='equipe.html';return;
    }
    throw new Error('Usuário não encontrado no sistema.');
  }catch(e){
    err.textContent=e.message;err.style.display='block';
    btn.innerHTML='Entrar no Sistema';btn.disabled=false;
  }
}

function _salvarSessao(tid,d,role,nome,fid,maeData,comissao=0){
  sessionStorage.setItem('j_tid',tid);
  sessionStorage.setItem('j_tnome',maeData.nomeFantasia||'Oficina');
  sessionStorage.setItem('j_role',role);
  sessionStorage.setItem('j_nome',nome);
  if(fid)sessionStorage.setItem('j_fid',fid);
  sessionStorage.setItem('j_comissao',comissao);
  sessionStorage.setItem('j_gemini',maeData.apiKeys?.gemini||'');
  sessionStorage.setItem('j_nicho',maeData.nicho||'carros');
  sessionStorage.setItem('j_cloud_name',maeData.apiKeys?.cloudName||'dmuvm1o6m');
  sessionStorage.setItem('j_cloud_preset',maeData.apiKeys?.cloudPreset||'evolution');
  const brand={
    name:maeData.brandName||maeData.nomeFantasia,
    tagline:maeData.brandTagline||'Gestão Automotiva',
    logoLetter:maeData.brandLetter||(maeData.nomeFantasia||'J').charAt(0).toUpperCase(),
    color:maeData.brandColor||'#3B82F6',
    footer:maeData.brandFooter||`${maeData.nomeFantasia} · Powered by JARVIS ERP`
  };
  const r=parseInt((brand.color||'#3B82F6').slice(1,3),16);
  const g=parseInt((brand.color||'#3B82F6').slice(3,5),16);
  const b=parseInt((brand.color||'#3B82F6').slice(5,7),16);
  brand.colorDim=`rgba(${r},${g},${b},.12)`;
  brand.colorGlow=`rgba(${r},${g},${b},.25)`;
  sessionStorage.setItem('j_brand',JSON.stringify(brand));
}

window.addEventListener('load',()=>{
  try{const b=JSON.parse(sessionStorage.getItem('j_brand')||'null');if(b)window.aplicarBrand(b);}catch(e){}
});
</script>
</body>
</html>
