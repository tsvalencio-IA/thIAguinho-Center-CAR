<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Portal do Cliente</title>
<link rel="stylesheet" href="css/design.css">
<style>
body { overflow-y: auto; }

.portal-bg {
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* Login portal */
.portal-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.portal-login-card {
  width: 100%;
  max-width: 380px;
  background: var(--surf-1);
  border: 1px solid var(--border-med);
  border-radius: var(--r-2xl);
  padding: 32px 28px;
  position: relative;
}

.portal-login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--brand), transparent);
}

/* Header */
.portal-header {
  background: var(--surf-0);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.portal-body {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px;
}

/* OS Card */
.os-card {
  background: var(--surf-1);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  overflow: hidden;
  margin-bottom: 16px;
}

.os-card-header {
  padding: 16px 20px;
  background: var(--surf-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.os-card-body { padding: 20px; }

/* Progress stepper (Ajustado para 7 etapas) */
.stepper {
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
  margin: 20px 0;
  justify-content: space-between;
}

.step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 1;
}

.step-dot {
  width: 26px; /* Diminuído ligeiramente para caber 7 passos no mobile */
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  border: 2px solid;
  background: var(--surf-1);
  transition: var(--t-mid);
  font-weight: 700;
}

.step.done   .step-dot { background: var(--success); border-color: var(--success); color: #000; }
.step.active .step-dot { background: var(--brand-dim); border-color: var(--brand); color: var(--brand); box-shadow: 0 0 14px var(--brand-glow); }
.step.pending .step-dot { border-color: var(--border-med); color: var(--text-muted); }

.step-label {
  font-family: var(--ff-mono);
  font-size: 0.45rem; /* Ajustado para caber 7 textos */
  letter-spacing: 0.04em;
  text-align: center;
  color: var(--text-muted);
  max-width: 50px;
}

.step.done .step-label   { color: var(--success); }
.step.active .step-label { color: var(--brand); font-weight: 700; }

.step-line {
  position: absolute;
  top: 13px; left: 0; right: 0;
  height: 2px;
  background: var(--border);
  z-index: 0;
}

.step-line-fill {
  position: absolute;
  top: 13px; left: 0;
  height: 2px;
  background: var(--success);
  z-index: 0;
  transition: width 0.6s ease;
}

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}

.info-item {
  background: var(--surf-2);
  border-radius: var(--r-lg);
  padding: 12px 14px;
}

.info-item-label {
  font-family: var(--ff-mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.info-item-value {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
}

/* Media preview */
.media-preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.media-preview-item {
  aspect-ratio: 1;
  border-radius: var(--r-md);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surf-2);
}

.media-preview-item img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

/* Chat no portal */
.portal-chat { margin-top: 16px; }

.portal-chat-messages {
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  min-height: 200px;
  max-height: 300px;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.chat-msg {
    padding: 10px 14px;
    border-radius: var(--r-md);
    max-width: 85%;
    font-size: 0.85rem;
    line-height: 1.4;
}

.chat-msg.outgoing {
    background: var(--brand-dim);
    border: 1px solid rgba(59, 130, 246, 0.3);
    color: var(--text-primary);
    align-self: flex-end;
}

.chat-msg.incoming {
    background: var(--surf-3);
    border: 1px solid var(--border);
    color: var(--text-primary);
    align-self: flex-start;
}

.msg-time {
    font-family: var(--ff-mono);
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
}

.portal-chat-input {
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--r-xl) var(--r-xl);
  padding: 10px;
  display: flex;
  gap: 8px;
}

/* Aprovação de orçamento */
.orcamento-alert {
  background: var(--warn-dim);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: var(--r-lg);
  padding: 16px 18px;
  margin-top: 14px;
}
</style>
</head>
<body>
<div id="toast-container"></div>

<div id="loginView" class="portal-bg">
  <div class="portal-login">
    <div class="portal-login-card">
      <div style="text-align:center;margin-bottom:24px">
        <div style="width:52px;height:52px;border-radius:var(--r-xl);background:var(--brand-dim);border:1px solid rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:1.4rem;font-weight:800;color:var(--brand);margin:0 auto 12px" id="portalLogoMark">J</div>
        <div style="font-family:var(--ff-display);font-size:1.2rem;font-weight:700" id="portalOficinaName">Portal do Cliente</div>
        <div style="font-family:var(--ff-mono);font-size:0.62rem;color:var(--text-muted);margin-top:4px;letter-spacing:0.08em">ACOMPANHE SEU VEÍCULO</div>
      </div>

      <div id="portalLoginErr" class="login-err" style="display:none; background: rgba(244, 63, 94, 0.1); color: #f43f5e; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 15px; text-align: center; border: 1px solid rgba(244, 63, 94, 0.2);">Credenciais inválidas.</div>

      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label" style="display:block;font-family:var(--ff-mono);font-size:0.6rem;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Login</label>
        <input class="input input-mono" id="pLogin" placeholder="seu.login" autocomplete="off" style="width:100%;padding:10px;background:var(--surf-2);border:1px solid var(--border);border-radius:4px;color:white;font-family:var(--ff-mono);">
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label" style="display:block;font-family:var(--ff-mono);font-size:0.6rem;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">PIN de acesso</label>
        <input class="input" id="pPin" type="password" placeholder="••••••" style="width:100%;padding:10px;background:var(--surf-2);border:1px solid var(--border);border-radius:4px;color:white;">
      </div>
      <button class="btn btn-brand btn-xl btn-full" onclick="portalLogin()" style="width:100%;padding:12px;background:var(--brand);color:white;border:none;border-radius:4px;font-family:var(--ff-display);font-weight:700;cursor:pointer;">Acessar Portal</button>

      <div style="text-align:center;margin-top:16px;font-size:0.75rem;color:var(--text-muted)">
        Seu login e PIN foram fornecidos pela oficina via WhatsApp.
      </div>
    </div>
  </div>
</div>

<div id="portalView" style="display:none" class="portal-bg">
  <div class="portal-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:var(--r-md);background:var(--brand-dim);border:1px solid rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:0.85rem;font-weight:800;color:var(--brand)" id="portalHdrMark">J</div>
      <div>
        <div style="font-family:var(--ff-display);font-size:0.85rem;font-weight:700" id="portalHdrName">Portal do Cliente</div>
        <div style="font-family:var(--ff-mono);font-size:0.55rem;color:var(--brand)" id="portalClienteNome">Carregando...</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="portalLogout()" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:4px;cursor:pointer;">Sair</button>
  </div>

  <div class="portal-body">
    <div id="portalContent">
      </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script>
// ============================================================
// PORTAL DO CLIENTE (ATUALIZADO PARA 7 ETAPAS CHEVRON E LGPD)
// ============================================================
const db = window.initFirebase();

let P = {
  clienteId: null,
  tenantId:  null,
  cliente:   null,
  oficina:   null
};

// Pré-carrega tenant via URL se tiver (Ex: portal.html?t=TENANT_ID)
const params = new URLSearchParams(window.location.search);
const _tenantSlug = params.get('tenant') || params.get('t') || null;

if (_tenantSlug) _carregarBrandTenant(_tenantSlug);

async function _carregarBrandTenant(tenantId) {
  try {
    const snap = await db.collection('oficinas').doc(tenantId).get();
    if (!snap.exists) return;
    const d = snap.data();
    
    // Configura o branding visual para White Label
    const brandColor = d.brandColor || '#3B82F6';
    document.documentElement.style.setProperty('--brand', brandColor);
    document.documentElement.style.setProperty('--brand-dim', `rgba(${_hexR(brandColor)},${_hexG(brandColor)},${_hexB(brandColor)},0.12)`);
    
    document.getElementById('portalOficinaName').textContent = d.nomeFantasia || 'Portal do Cliente';
    const logoL = d.brandLetter || (d.nomeFantasia||'J').charAt(0).toUpperCase();
    document.getElementById('portalLogoMark').textContent = logoL;
    document.getElementById('portalHdrMark').textContent  = logoL;
    document.getElementById('portalHdrName').textContent  = d.nomeFantasia || 'Portal do Cliente';
    
    P.tenantId = tenantId;
    P.oficina  = d;
  } catch(e) {}
}

// ============================================================
// LOGIN
// ============================================================
document.getElementById('pPin').addEventListener('keydown', e => { if (e.key === 'Enter') portalLogin(); });
document.getElementById('pLogin').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pPin').focus(); });

async function portalLogin() {
  const login = document.getElementById('pLogin').value.trim();
  const pin   = document.getElementById('pPin').value.trim();
  const err   = document.getElementById('portalLoginErr');
  err.style.display = 'none';

  if (!login || !pin) { err.textContent = 'Preencha login e PIN.'; err.style.display='block'; return; }

  const btn = document.querySelector('#loginView button');
  btn.innerHTML = 'Verificando...';
  btn.disabled = true;

  try {
    let q = db.collection('clientes').where('login', '==', login);
    if (P.tenantId) q = q.where('tenantId', '==', P.tenantId);
    const snap = await q.get();

    if (snap.empty) throw new Error('Usuário não encontrado.');
    const doc = snap.docs[0];
    const c   = doc.data();
    if (c.pin !== pin) throw new Error('PIN inválido.');

    P.clienteId = doc.id;
    P.tenantId  = c.tenantId;
    P.cliente   = { id: doc.id, ...c };

    if (!P.oficina) {
      const ofSnap = await db.collection('oficinas').doc(P.tenantId).get();
      if (ofSnap.exists) {
        P.oficina = ofSnap.data();
        await _carregarBrandTenant(P.tenantId);
      }
    }

    document.getElementById('portalClienteNome').textContent = c.nome;
    document.getElementById('loginView').style.display  = 'none';
    document.getElementById('portalView').style.display = 'block';

    _iniciarPortal();

  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.innerHTML = 'Acessar Portal';
    btn.disabled = false;
  }
}

function portalLogout() {
  P = { clienteId: null, tenantId: null, cliente: null, oficina: null };
  document.getElementById('loginView').style.display  = 'block';
  document.getElementById('portalView').style.display = 'none';
  document.getElementById('portalLoginErr').style.display = 'none';
  document.getElementById('pLogin').value = '';
  document.getElementById('pPin').value   = '';
}

// ============================================================
// PORTAL PRINCIPAL
// ============================================================
function _iniciarPortal() {
  db.collection('ordens_servico')
    .where('tenantId', '==', P.tenantId)
    .where('clienteId', '==', P.clienteId)
    .onSnapshot(snap => {
      const osList = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.updatedAt || '') > (a.updatedAt || '') ? 1 : -1);
      _renderPortal(osList);
    });

  db.collection('mensagens')
    .where('tenantId', '==', P.tenantId)
    .where('clienteId', '==', P.clienteId)
    .onSnapshot(snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(a.ts||0)-(b.ts||0));
      _renderChat(msgs);
    });
}

function _renderPortal(osList) {
  const content = document.getElementById('portalContent');
  
  // OS 7 STATUS DA DIRETRIZ CHEVRON
  const STEPS = ['Triagem', 'Orcamento', 'Orcamento_Enviado', 'Aprovado', 'Andamento', 'Pronto', 'Entregue'];
  const STEP_LABELS = {
    Triagem:           'Triagem',
    Orcamento:         'Orçamento',
    Orcamento_Enviado: 'Enviado',
    Aprovado:          'Aprovado',
    Andamento:         'Em Serviço',
    Pronto:            'Pronto',
    Entregue:          'Entregue'
  };

  if (!osList.length) {
    content.innerHTML = `
      <div style="text-align:center;padding:48px 20px">
        <div style="font-size:2.5rem;margin-bottom:12px">🚗</div>
        <div style="font-family:var(--ff-display);font-size:1rem;font-weight:700;color:var(--text-secondary)">Nenhuma O.S. no momento</div>
        <div style="font-size:0.82rem;color:var(--text-muted);margin-top:6px">Quando você levar seu veículo, ele aparecerá aqui.</div>
      </div>
      ${_chatHTML()}
    `;
    _bindChat();
    return;
  }

  content.innerHTML = osList.map(os => {
    // Tratamento de segurança caso OS legadas não tenham o status novo mapeado
    const statusLimpo = STEPS.includes(os.status) ? os.status : (os.status === 'Aguardando' ? 'Triagem' : (os.status === 'Concluido' ? 'Entregue' : 'Triagem'));
    const statusIdx = STEPS.indexOf(statusLimpo);
    
    const isConcluida = (statusLimpo === 'Pronto' || statusLimpo === 'Entregue');
    const isOrcamento = (statusLimpo === 'Orcamento_Enviado');

    // Stepper Chevron (7 Etapas)
    const stepperHTML = `
      <div style="position:relative; margin-bottom: 24px;">
        <div class="step-line"></div>
        <div class="step-line-fill" style="width:${Math.max(0, (statusIdx / (STEPS.length-1)) * 100)}%"></div>
        <div class="stepper">
          ${STEPS.map((s, i) => {
            const cls = i < statusIdx ? 'done' : i === statusIdx ? 'active' : 'pending';
            const icon = i < statusIdx ? '✓' : (i + 1).toString();
            return `<div class="step ${cls}">
              <div class="step-dot">${icon}</div>
              <div class="step-label">${STEP_LABELS[s] || s}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;

    // Alerta de Aprovação de Orçamento (Evolution B2C)
    const orcAlerta = isOrcamento ? `
      <div class="orcamento-alert">
        <div style="font-family:var(--ff-display);font-weight:700;color:var(--warn);margin-bottom:6px">💰 Orçamento aguardando aprovação</div>
        <div style="font-size:0.84rem;color:var(--text-secondary);margin-bottom:12px">
          Valor do serviço: <strong style="color:var(--text-primary)">${_moeda(os.total)}</strong>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-brand" style="background:#10B981;color:white;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-weight:700;" onclick="_aprovarOrcamento('${os.id}')">✓ APROVAR</button>
          <button class="btn btn-danger" style="background:transparent;border:1px solid rgba(255,59,59,0.5);color:#FF3B3B;padding:8px 16px;border-radius:4px;cursor:pointer;" onclick="_recusarOrcamento('${os.id}')">✕ RECUSAR</button>
        </div>
      </div>
    ` : '';

    // Serviços Detalhados (Múltiplos) + Peças (Novo Formato)
    let detalheHtml = '';
    if (os.servicos?.length > 0 || os.pecas?.length > 0 || os.maoObra > 0) {
      detalheHtml += `
        <div style="margin-top:14px">
          <div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:2px;margin-bottom:8px;">DETALHAMENTO TÉCNICO</div>
          <div style="background:var(--surf-2);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">`;
      
      // Renderiza Serviços
      if(os.servicos) {
        os.servicos.forEach(s => {
          detalheHtml += `<div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)"><div style="font-size:0.84rem">🔧 ${s.desc || 'Serviço'}</div><div style="font-family:var(--ff-mono);font-size:0.82rem;">${_moeda(s.valor)}</div></div>`;
        });
      } else if (os.maoObra) {
        detalheHtml += `<div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)"><div style="font-size:0.84rem">🔧 Mão de Obra Geral</div><div style="font-family:var(--ff-mono);font-size:0.82rem;">${_moeda(os.maoObra)}</div></div>`;
      }
      
      // Renderiza Peças
      if(os.pecas) {
        os.pecas.forEach(p => {
          detalheHtml += `<div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)"><div style="font-size:0.84rem">📦 ${p.desc || '—'} (x${p.qtd})</div><div style="font-family:var(--ff-mono);font-size:0.82rem;color:var(--success)">${_moeda(p.qtd * p.venda)}</div></div>`;
        });
      }
      
      detalheHtml += `</div>
          ${os.total ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--success-dim);border-radius:0 0 var(--r-lg) var(--r-lg);border:1px solid rgba(34,211,160,0.2);border-top:none"><span style="font-family:var(--ff-mono);font-size:0.7rem;color:var(--text-muted)">TOTAL APROVADO</span><span style="font-family:var(--ff-display);font-size:1.3rem;font-weight:800;color:var(--success)">${_moeda(os.total)}</span></div>` : ''}
        </div>`;
    }

    // Fotos de Evidência
    const fotoHTML = os.media?.length ? `
      <div style="margin-top:14px">
        <div style="font-family:var(--ff-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:2px;margin-bottom:8px;">GALERIA DE FOTOS DO SERVIÇO</div>
        <div class="media-preview-grid">
          ${os.media.map(m => m.type !== 'video'
            ? `<div class="media-preview-item"><img src="${m.url}" onclick="window.open('${m.url}','_blank')" loading="lazy"></div>`
            : `<div class="media-preview-item" style="cursor:pointer" onclick="window.open('${m.url}','_blank')"><div style="height:100%;display:flex;align-items:center;justify-content:center;font-size:1.5rem">▶️</div></div>`
          ).join('')}
        </div>
      </div>
    ` : '';

    // Alerta de Conclusão
    const entregaHTML = isConcluida ? `
      <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:var(--r-lg);padding:14px 16px;margin-top:14px;display:flex;align-items:center;gap:12px">
        <div style="font-size:1.5rem">🎉</div>
        <div>
          <div style="font-family:var(--ff-display);font-weight:700;color:var(--success)">Veículo Liberado!</div>
          <div style="font-size:0.82rem;color:var(--text-secondary)">Seu veículo está pronto para retirada em ${P.oficina?.nomeFantasia || 'nossa oficina'}.</div>
        </div>
      </div>
    ` : '';

    return `
      <div class="os-card">
        <div class="os-card-header">
          <div>
            <div style="font-family:var(--ff-mono);font-size:0.72rem;color:var(--text-muted);margin-bottom:2px">OS #${os.id.slice(-6).toUpperCase()}</div>
            <div style="font-family:var(--ff-display);font-size:1rem;font-weight:700">${os.tipoVeiculo === 'bicicleta' ? '🚲' : os.tipoVeiculo === 'moto' ? '🏍️' : '🚗'} ${os.desc?.substring(0,40) || 'Serviço'}${os.desc?.length > 40 ? '...' : ''}</div>
          </div>
          <span style="font-family:var(--ff-mono);font-size:0.7rem;color:var(--brand);font-weight:700;text-transform:uppercase;border:1px solid var(--brand);padding:2px 8px;border-radius:10px;">${STEP_LABELS[statusLimpo] || statusLimpo}</span>
        </div>
        <div class="os-card-body">
          ${stepperHTML}
          ${orcAlerta}
          ${entregaHTML}

          <div class="info-grid">
            <div class="info-item">
              <div class="info-item-label">Data de Entrada</div>
              <div class="info-item-value">${_dtBr(os.data)}</div>
            </div>
            <div class="info-item">
              <div class="info-item-label">KM / Milhagem</div>
              <div class="info-item-value">${os.km ? Number(os.km).toLocaleString('pt-BR') + ' km' : '—'}</div>
            </div>
          </div>

          ${detalheHtml}
          ${fotoHTML}
        </div>
      </div>
    `;
  }).join('') + _chatHTML();

  _bindChat();
}

function _chatHTML() {
  return `
    <div class="os-card portal-chat">
      <div class="os-card-header">
        <div style="font-family:var(--ff-display);font-weight:700">💬 Fale com o Mecânico / Oficina</div>
        <div style="width:8px;height:8px;background:var(--success);border-radius:50%;"></div>
      </div>
      <div class="portal-chat-messages" id="portalChatMsgs">
        <div style="text-align:center;color:var(--text-muted);font-size:0.78rem;padding:16px">
          Envie uma mensagem direta para a oficina.
        </div>
      </div>
      <div class="portal-chat-input">
        <input class="input" id="portalChatInput" placeholder="Digite sua dúvida ou resposta..." style="flex:1;background:var(--surf-1);border:1px solid var(--border);color:white;padding:10px;border-radius:4px;">
        <button class="btn btn-brand" style="background:var(--brand);color:white;border:none;padding:10px 16px;border-radius:4px;cursor:pointer;font-weight:700;" onclick="_enviarPortalMsg()" id="btnPortalEnviar">ENVIAR</button>
      </div>
    </div>
  `;
}

function _bindChat() {
  const inp = document.getElementById('portalChatInput');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); _enviarPortalMsg(); } });
}

function _renderChat(msgs) {
  const container = document.getElementById('portalChatMsgs');
  if (!container) return;
  if (!msgs.length) return;
  container.innerHTML = msgs.map(m => {
    const t   = m.ts ? new Date(m.ts).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) : '';
    const dir = m.sender === 'cliente' ? 'outgoing' : 'incoming';
    return `<div class="chat-msg ${dir}">${m.msg}<div class="msg-time">${t}</div></div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
  
  // Marca mensagens da oficina como lidas pelo cliente
  msgs.filter(m => m.sender === 'admin' && !m.lidaCliente)
    .forEach(m => db.collection('mensagens').doc(m.id).update({ lidaCliente: true }).catch(()=>{}));
}

async function _enviarPortalMsg() {
  const inp = document.getElementById('portalChatInput');
  const msg = inp?.value?.trim();
  if (!msg) return;
  await db.collection('mensagens').add({
    tenantId:    P.tenantId,
    clienteId:   P.clienteId,
    sender:      'cliente',
    msg,
    lidaAdmin:   false,
    lidaCliente: true,
    ts:          Date.now()
  });
  inp.value = '';
}

async function _aprovarOrcamento(osId) {
  await db.collection('ordens_servico').doc(osId).update({ status: 'Aprovado', updatedAt: new Date().toISOString() });
  
  // Audita e notifica a oficina
  await db.collection('lixeira_auditoria').add({
    tenantId: P.tenantId,
    modulo: 'PORTAL B2C',
    acao: `Cliente aprovou o orçamento da OS #${osId.slice(-6)}`,
    usuario: P.cliente?.nome || 'Cliente',
    ts: new Date().toISOString()
  });
  
  toast('Orçamento aprovado! A oficina já foi notificada.', 'success');
}

async function _recusarOrcamento(osId) {
  if (!confirm('Tem certeza que deseja recusar o orçamento? A O.S. será cancelada.')) return;
  await db.collection('ordens_servico').doc(osId).update({ status: 'Cancelado', updatedAt: new Date().toISOString() });
  
  await db.collection('lixeira_auditoria').add({
    tenantId: P.tenantId,
    modulo: 'PORTAL B2C',
    acao: `Cliente recusou o orçamento da OS #${osId.slice(-6)}`,
    usuario: P.cliente?.nome || 'Cliente',
    ts: new Date().toISOString()
  });
  
  toast('Orçamento recusado.', 'warn');
}

// ──────────────────────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────────────────────
function _moeda(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(parseFloat(v)||0); }
function _dtBr(iso) { try { return iso ? new Date(iso).toLocaleDateString('pt-BR') : '—'; } catch { return iso||'—'; } }

function toast(msg, type='ok') {
  const box = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.style.cssText = `background:${type==='warn'?'#F59E0B':'#10B981'};color:white;padding:12px 20px;margin-bottom:10px;border-radius:4px;font-family:var(--ff-display);font-weight:700;animation: slideUp 0.3s ease;`;
  el.innerHTML = msg;
  box.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(),400); }, 3500);
}

function _hexR(hex) { return parseInt(hex.replace('#','').substring(0,2),16); }
function _hexG(hex) { return parseInt(hex.replace('#','').substring(2,4),16); }
function _hexB(hex) { return parseInt(hex.replace('#','').substring(4,6),16); }
</script>
