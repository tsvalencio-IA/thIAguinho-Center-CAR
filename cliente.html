<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente — JARVIS ERP</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<link rel="stylesheet" href="css/design.css">
<style>
body { background: var(--bg); }
.cli-header { background: var(--surf); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.cli-content { max-width: 700px; margin: 0 auto; padding: 20px; }
.status-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.status-step { flex: 1; min-width: 80px; text-align: center; padding: 8px 6px; font-family: var(--fm); font-size: 0.55rem; letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--border); color: var(--text-muted); transition: all 0.2s; }
.status-step.done  { border-color: var(--success); color: var(--success); background: var(--success-dim); }
.status-step.active { border-color: var(--brand); color: var(--brand); background: var(--brand-dim); font-weight: 700; }
.os-card { background: var(--surf); border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; border-left: 4px solid var(--brand); }
.os-card.concluida { border-left-color: var(--success); }
.os-val { font-family: var(--fd); font-size: 2.2rem; font-weight: 700; color: var(--success); }
.media-thumb { width: 80px; height: 80px; object-fit: cover; border: 1px solid var(--border); cursor: pointer; }
.chat-cli { background: var(--surf); border: 1px solid var(--border); display: flex; flex-direction: column; height: 55vh; }
.chat-msg-list { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.msg-c { max-width: 80%; padding: 10px 14px; font-size: 0.85rem; line-height: 1.5; }
.msg-c.saida  { background: var(--brand-dim); border: 1px solid var(--border2); align-self: flex-end; }
.msg-c.entrada{ background: var(--surf3); border: 1px solid var(--border); align-self: flex-start; }
.msg-time { font-family: var(--fm); font-size: 0.58rem; color: var(--text-muted); margin-top: 4px; text-align: right; }
</style>
</head>
<body>
<div id="toast-container"></div>

<!-- LOGIN -->
<div id="loginArea" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px">
  <div class="login-card" style="max-width:380px">
    <div class="login-logo-wrap">
      <div class="login-logo-mark sb-brand-mark" style="margin:0 auto 14px">J</div>
      <div class="login-title brand-name">Portal do Cliente</div>
      <div class="login-sub brand-tagline">Acompanhe sua O.S. em tempo real</div>
    </div>
    <div id="cliLoginErr" class="login-err">Login ou PIN incorretos.</div>
    <div class="form-group">
      <label class="j-label">Login / E-mail</label>
      <input class="j-input input-mono" id="cliLoginInput" placeholder="Seu login">
    </div>
    <div class="form-group">
      <label class="j-label">PIN de Acesso</label>
      <input class="j-input input-mono" id="cliPinInput" placeholder="PIN de 4 a 8 dígitos" type="password" maxlength="8">
    </div>
    <button class="btn btn-brand btn-xl btn-full" id="btnCliLogin" onclick="clienteLogin()" style="margin-top:8px">ACESSAR MINHA GARAGEM</button>
  </div>
</div>

<!-- PORTAL -->
<div id="portalArea" style="display:none">
  <div class="cli-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sb-brand-mark" style="width:28px;height:28px;font-size:.9rem">J</div>
      <div>
        <div style="font-family:var(--fd);font-size:.95rem;font-weight:700" id="cliNomeDisplay">Minha Garagem</div>
        <div style="font-family:var(--fm);font-size:.58rem;color:var(--text-muted)" id="cliTenantDisplay"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="live-dot" style="width:6px;height:6px"></div>
      <span style="font-family:var(--fm);font-size:.6rem;color:var(--text-muted)">AO VIVO</span>
      <button class="btn-sair" onclick="clienteSair()" style="width:auto;padding:6px 12px;margin-left:8px">Sair</button>
    </div>
  </div>

  <div class="cli-content">
    <!-- Tabs -->
    <div style="display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:-1px">
      <div class="mtab active" onclick="cliTab('os',this)" id="tabBtnOS">MINHAS O.S.</div>
      <div class="mtab" onclick="cliTab('historico',this)">HISTÓRICO</div>
      <div class="mtab" onclick="cliTab('chat',this)" id="tabBtnChat">MENSAGENS <span id="cliChatBadge" style="display:none;background:var(--danger);color:#fff;font-family:var(--fm);font-size:.55rem;padding:2px 5px;border-radius:10px;margin-left:4px">0</span></div>
    </div>

    <!-- OS ATIVAS -->
    <div id="cliTabOS">
      <div id="cliOSLista">
        <div class="empty-state"><div class="empty-state-icon">🔧</div><div class="empty-state-sub">Carregando...</div></div>
      </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="cliTabHistorico" style="display:none">
      <div id="cliHistoricoLista">
        <div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-sub">Carregando histórico...</div></div>
      </div>
    </div>

    <!-- CHAT -->
    <div id="cliTabChat" style="display:none">
      <div class="chat-cli">
        <div class="chat-msg-list" id="cliChatMsgs"></div>
        <div style="padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surf2)">
          <input class="j-input" id="cliChatInput" placeholder="Escreva sua mensagem..." style="flex:1">
          <button class="btn btn-brand" onclick="cliEnviarMsg()">ENVIAR</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const db = window.initFirebase();
let _cliData = null;    // dados do cliente logado
let _cliTid  = null;    // tenantId
let _cliOSes = [];      // OS do cliente
let _cliMsgs = [];      // mensagens do cliente
let _unsub   = [];      // unsubscribers

const STATUS_ORDEM = ['Triagem','Orcamento','Orcamento_Enviado','Aprovado','Andamento','Pronto','Entregue'];
const STATUS_LABELS = {
  'Triagem':'Triagem','Orcamento':'Orçamento','Orcamento_Enviado':'Orç. Enviado',
  'Aprovado':'Aprovado','Andamento':'Em Serviço','Pronto':'Pronto!','Entregue':'Entregue'
};

function moeda(v) { return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(parseFloat(v)||0); }
function dtBr(iso) { if(!iso) return '—'; try{return new Date(iso).toLocaleDateString('pt-BR');}catch{return iso;} }
function dtHrBr(iso) { if(!iso) return '—'; try{return new Date(iso).toLocaleString('pt-BR');}catch{return iso;} }
function toast(msg,type='success'){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c);}
  const el=document.createElement('div');el.className=`toast ${type}`;
  el.innerHTML=`<div class="toast-icon">${type==='error'?'✕':type==='warn'?'⚠':'✓'}</div><div class="toast-content"><div class="toast-msg">${msg}</div></div>`;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),350);},(type==='error'?5000:3500));
}

// ── LOGIN ──────────────────────────────────────────────────
document.getElementById('cliPinInput').addEventListener('keydown',e=>{if(e.key==='Enter')clienteLogin();});
document.getElementById('cliLoginInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('cliPinInput').focus();});

async function clienteLogin() {
  const login = document.getElementById('cliLoginInput').value.trim();
  const pin   = document.getElementById('cliPinInput').value.trim();
  const errEl = document.getElementById('cliLoginErr');
  errEl.style.display='none';
  if(!login||!pin){errEl.textContent='Preencha login e PIN.';errEl.style.display='block';return;}

  const btn=document.getElementById('btnCliLogin');
  btn.innerHTML='<span class="spinner"></span> Verificando...'; btn.disabled=true;

  try {
    // Busca em todas as oficinas
    const oficinas = await db.collection('oficinas').get();
    let cliDoc=null, tid=null;

    for(const ofc of oficinas.docs) {
      const snap=await db.collection('clientes')
        .where('tenantId','==',ofc.id)
        .where('login','==',login)
        .get();
      if(!snap.empty){
        const c=snap.docs[0].data();
        if((c.pin||'')===pin){cliDoc=snap.docs[0];tid=ofc.id;break;}
      }
      // Fallback: buscar por email
      const snap2=await db.collection('clientes')
        .where('tenantId','==',ofc.id)
        .where('email','==',login)
        .get();
      if(!snap2.empty){
        const c=snap2.docs[0].data();
        if((c.pin||'')===pin){cliDoc=snap2.docs[0];tid=ofc.id;break;}
      }
    }

    if(!cliDoc){throw new Error('Login ou PIN incorretos.');}

    _cliData = {id:cliDoc.id,...cliDoc.data()};
    _cliTid  = tid;

    // Busca brand da oficina
    const ofc = await db.collection('oficinas').doc(tid).get();
    const od  = ofc.data()||{};

    // Aplicar brand
    const root=document.documentElement;
    root.style.setProperty('--brand', od.brandColor||'#3B82F6');
    root.style.setProperty('--brand-dim', `rgba(59,130,246,.12)`);

    document.querySelectorAll('.brand-name').forEach(el=>el.textContent=od.brandName||od.nomeFantasia||'JARVIS ERP');

    document.getElementById('cliNomeDisplay').textContent = 'Olá, '+_cliData.nome.split(' ')[0]+'!';
    document.getElementById('cliTenantDisplay').textContent = od.nomeFantasia||'Oficina';

    document.getElementById('loginArea').style.display='none';
    document.getElementById('portalArea').style.display='block';

    // Iniciar listeners
    _iniciarListeners();
  } catch(e) {
    errEl.textContent=e.message; errEl.style.display='block';
    btn.innerHTML='ACESSAR MINHA GARAGEM'; btn.disabled=false;
  }
}

function clienteSair() {
  _unsub.forEach(fn=>{ try{fn();}catch(e){} });
  _unsub=[];
  document.getElementById('loginArea').style.display='flex';
  document.getElementById('portalArea').style.display='none';
  document.getElementById('cliLoginInput').value='';
  document.getElementById('cliPinInput').value='';
}

// ── LISTENERS ──────────────────────────────────────────────
function _iniciarListeners() {
  // OS do cliente
  const unOS = db.collection('ordens_servico')
    .where('tenantId','==',_cliTid)
    .where('clienteId','==',_cliData.id)
    .onSnapshot(snap=>{
      _cliOSes = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt>a.createdAt?1:-1);
      _renderOS();
      _renderHistorico();
    });
  _unsub.push(unOS);

  // Mensagens
  const unMsg = db.collection('mensagens')
    .where('tenantId','==',_cliTid)
    .where('clienteId','==',_cliData.id)
    .onSnapshot(snap=>{
      _cliMsgs = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.ts||0)-(b.ts||0));
      _renderChat();
      const naoLidas=_cliMsgs.filter(m=>m.sender==='admin'&&!m.lidaCliente).length;
      const badge=document.getElementById('cliChatBadge');
      if(badge){badge.style.display=naoLidas>0?'inline':'none';badge.textContent=naoLidas;}
    });
  _unsub.push(unMsg);
}

// ── RENDER OS ATIVAS ───────────────────────────────────────
function _renderOS() {
  const ativas = _cliOSes.filter(o=>o.status!=='Entregue'&&o.status!=='Cancelado');
  const div = document.getElementById('cliOSLista');

  if(!ativas.length){
    div.innerHTML='<div class="empty-state"><div class="empty-state-icon">🚗</div><div class="empty-state-title">Nenhuma O.S. ativa</div><div class="empty-state-sub">Seu veículo não está na oficina no momento.</div></div>';
    return;
  }

  div.innerHTML=ativas.map(os=>{
    const stIdx = STATUS_ORDEM.indexOf(os.status);
    const stBar = STATUS_ORDEM.map((s,i)=>`
      <div class="status-step ${i<stIdx?'done':i===stIdx?'active':''}">${STATUS_LABELS[s]||s}</div>`).join('');
    const mediaHtml = (os.media||[]).slice(0,4).map(m=>
      `<img src="${m.url}" class="media-thumb" onclick="window.open('${m.url}')" alt="Foto" loading="lazy">`).join('');
    const tlHtml = os.timeline?.length ? [...os.timeline].reverse().slice(0,3).map(e=>
      `<div style="font-family:var(--fm);font-size:.68rem;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-muted)">${dtHrBr(e.dt)}</span> — ${e.acao||''}</div>`).join('') : '';
    const approveBtn = os.status==='Orcamento_Enviado' ? `
      <div style="margin-top:14px;padding:14px;background:rgba(34,211,160,.08);border:1px solid rgba(34,211,160,.3)">
        <p style="font-family:var(--fm);font-size:.78rem;color:var(--success);margin-bottom:10px">✅ Orçamento aguarda sua aprovação. Total: <strong>${moeda(os.total||0)}</strong></p>
        <button class="btn btn-success" onclick="aprovarOS('${os.id}')">APROVAR E AUTORIZAR SERVIÇO</button>
        <button class="btn btn-danger" onclick="recusarOS('${os.id}')" style="margin-left:8px">RECUSAR</button>
      </div>` : '';

    return `<div class="os-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-family:var(--fm);font-size:1.1rem;font-weight:700;color:var(--brand)">${os.placa||'?'}</div>
          <div style="color:var(--text-secondary);font-size:.82rem">${os.desc||os.relato||'Serviço'}</div>
        </div>
        <div class="os-val">${moeda(os.total||0)}</div>
      </div>
      <div class="status-bar">${stBar}</div>
      ${os.diagnostico?`<div style="background:var(--surf3);border:1px solid var(--border);padding:12px;margin:10px 0;font-size:.82rem"><strong style="color:var(--brand);font-size:.72rem;font-family:var(--fm)">DIAGNÓSTICO TÉCNICO:</strong><br>${os.diagnostico}</div>`:''}
      ${approveBtn}
      ${mediaHtml?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">${mediaHtml}</div>`:''}
      ${tlHtml?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-family:var(--fm);font-size:.6rem;color:var(--text-muted);letter-spacing:2px;margin-bottom:6px">HISTÓRICO</div>${tlHtml}</div>`:''}
    </div>`;
  }).join('');
}

// ── APROVAR / RECUSAR ORÇAMENTO ────────────────────────────
async function aprovarOS(osId) {
  const os = _cliOSes.find(x=>x.id===osId); if(!os) return;
  const tl = [...(os.timeline||[])];
  tl.push({dt:new Date().toISOString(),user:_cliData.nome,acao:'Cliente APROVOU o orçamento via portal.',tipo:'aprovacao'});
  await db.collection('ordens_servico').doc(osId).update({status:'Aprovado',timeline:tl,updatedAt:new Date().toISOString()});
  // Envia notificação como mensagem
  await db.collection('mensagens').add({tenantId:_cliTid,clienteId:_cliData.id,sender:'cliente',msg:`✅ Orçamento APROVADO por ${_cliData.nome}. Pode iniciar o serviço!`,lidaAdmin:false,lidaCliente:true,ts:Date.now()});
  toast('✅ Orçamento aprovado com sucesso!');
}

async function recusarOS(osId) {
  if(!confirm('Tem certeza que deseja recusar este orçamento?')) return;
  const os = _cliOSes.find(x=>x.id===osId); if(!os) return;
  const tl = [...(os.timeline||[])];
  tl.push({dt:new Date().toISOString(),user:_cliData.nome,acao:'Cliente RECUSOU o orçamento via portal.',tipo:'recusa'});
  await db.collection('ordens_servico').doc(osId).update({status:'Cancelado',timeline:tl,updatedAt:new Date().toISOString()});
  await db.collection('mensagens').add({tenantId:_cliTid,clienteId:_cliData.id,sender:'cliente',msg:`❌ Orçamento RECUSADO por ${_cliData.nome}.`,lidaAdmin:false,lidaCliente:true,ts:Date.now()});
  toast('Orçamento recusado.','warn');
}

// ── HISTÓRICO ──────────────────────────────────────────────
function _renderHistorico() {
  const hist = _cliOSes.filter(o=>['Entregue','Cancelado'].includes(o.status));
  const div  = document.getElementById('cliHistoricoLista');
  if(!hist.length){div.innerHTML='<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-sub">Nenhum veículo entregue ainda.</div></div>';return;}
  div.innerHTML=hist.map(os=>`<div class="os-card concluida">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div><div style="font-family:var(--fm);font-size:1rem;font-weight:700;color:var(--success)">${os.placa||'?'}</div><div style="color:var(--text-secondary);font-size:.8rem">${os.desc||''}</div></div>
      <div style="text-align:right"><div style="font-family:var(--fd);font-size:1.6rem;font-weight:700;color:var(--success)">${moeda(os.total||0)}</div><div style="font-family:var(--fm);font-size:.62rem;color:var(--text-muted)">${dtBr(os.updatedAt)}</div></div>
    </div>
    <span class="badge badge-success">${os.status}</span>
  </div>`).join('');
}

// ── CHAT ───────────────────────────────────────────────────
function _renderChat() {
  const container=document.getElementById('cliChatMsgs'); if(!container) return;
  if(!_cliMsgs.length){container.innerHTML='<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-sub">Sem mensagens ainda</div></div>';return;}
  container.innerHTML=_cliMsgs.map(m=>{
    const t=m.ts?new Date(m.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    const dir=m.sender==='cliente'?'saida':'entrada';
    return `<div class="msg-c ${dir}">${m.msg||''}${m.fileUrl?`<br><a href="${m.fileUrl}" target="_blank" style="color:var(--brand)">📎 Ver Arquivo</a>`:''}
      <div class="msg-time">${t}</div></div>`;
  }).join('');
  container.scrollTop=container.scrollHeight;
  // Marcar como lidas
  _cliMsgs.filter(m=>m.sender==='admin'&&!m.lidaCliente).forEach(m=>{
    db.collection('mensagens').doc(m.id).update({lidaCliente:true}).catch(()=>{});
  });
}

async function cliEnviarMsg() {
  const msg=document.getElementById('cliChatInput').value.trim(); if(!msg) return;
  await db.collection('mensagens').add({tenantId:_cliTid,clienteId:_cliData.id,sender:'cliente',msg,lidaAdmin:false,lidaCliente:true,ts:Date.now()});
  document.getElementById('cliChatInput').value='';
}
document.getElementById('cliChatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();cliEnviarMsg();}});

// ── TABS ───────────────────────────────────────────────────
function cliTab(key, el) {
  const map={os:'cliTabOS',historico:'cliTabHistorico',chat:'cliTabChat'};
  Object.values(map).forEach(id=>{const d=document.getElementById(id);if(d)d.style.display='none';});
  const target=document.getElementById(map[key]); if(target) target.style.display='block';
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
}
</script>
</body>
</html>
